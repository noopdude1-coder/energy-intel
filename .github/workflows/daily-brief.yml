name: daily-brief

# Weekdays at 06:00 America/Chicago. Chicago is UTC-5 during CDT (Mar–Nov) and
# UTC-6 during CST (Nov–Mar). GitHub cron is UTC only, so we schedule both slots
# and the runner will fire during whichever is current.
on:
  schedule:
    - cron: "0 11 * * 1-5"   # 06:00 CDT (UTC-5)
    - cron: "0 12 * * 1-5"   # 06:00 CST (UTC-6)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-brief
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest -q

      - name: Generate brief
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.main

      - name: Commit brief
        run: |
          git config user.name "energy-intel-bot"
          git config user.email "energy-intel-bot@users.noreply.github.com"
          git add briefs/
          if git diff --cached --quiet; then
            echo "No brief changes to commit"
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          git commit -m "brief: ${TODAY}"
          git push
