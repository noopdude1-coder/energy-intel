name: pages

# Build + deploy the static dashboard.
# Triggers:
#   - Push to main that touches briefs, peer_comp, or site code
#   - Daily-brief workflow's commits land on main, so those push events re-deploy
#   - Manual trigger for ad-hoc rebuilds (e.g. after tweaking templates)
#
# Requires: Settings → Pages → Build and deployment source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "briefs/**"
      - "data/peer_history.parquet"
      - "src/site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt markdown

      - uses: actions/configure-pages@v5

      - name: Build site
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: python -m src.site.build --out site --base-path energy-intel

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
