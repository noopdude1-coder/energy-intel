name: peer-report

# Weekly run on Sundays at 12:00 UTC (06:00 CST / 07:00 CDT). Picks up any
# 10-Q / 10-K filings that landed during the week. Outside earnings season
# the parquet won't change, so the commit step no-ops on push.
# Manual trigger also supported for ad-hoc refresh after big filings.
on:
  schedule:
    - cron: "0 12 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write   # so we can dispatch the pages workflow at the end

jobs:
  peer-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyarrow

      - name: Run peer report
        env:
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT }}
        run: python -m src.peer_report -v

      - name: Commit report
        id: commit
        run: |
          git config user.name "energy-intel-bot"
          git config user.email "energy-intel-bot@users.noreply.github.com"
          git add briefs/peer_comp.md data/peer_history.parquet
          if git diff --cached --quiet; then
            echo "No peer-report changes"
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TODAY=$(date -u +%Y-%m-%d)
          git commit -m "peer-report: ${TODAY}"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger pages rebuild
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run pages.yml --ref main --repo "${{ github.repository }}"
