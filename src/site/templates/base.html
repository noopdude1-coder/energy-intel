<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }} — Energy Intel</title>
<link rel="stylesheet" href="{{ asset('style.css') }}">
{% block head_extra %}{% endblock %}
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ link('') }}">energy-intel</a>
  <nav>
    <a href="{{ link('') }}">Latest</a>
    <a href="{{ link('archive/') }}">Archive</a>
    <a href="{{ link('peers/') }}">Peers</a>
    <a href="{{ link('macro/') }}">Macro</a>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>
  <small>
    Generated {{ generated_at }} UTC ·
    Data: EIA, FRED, Baker Hughes, SEC EDGAR, Yahoo Finance ·
    Position data never exposed on this site.
  </small>
</footer>
<script>
// Colorize +/- numerics in any rendered <td>.
(function () {
  var re = /^([+\-−])\s*\$?[\d,]+(?:\.\d+)?\s*%?$/;
  document.querySelectorAll('td').forEach(function (td) {
    var t = td.textContent.trim();
    var m = t.match(re);
    if (!m) return;
    if (m[1] === '+') td.classList.add('pos');
    else td.classList.add('neg');
  });
})();

// Click-to-sort table headers. Numeric cells (currency, %, ratios) sort
// numerically; everything else falls back to localeCompare.
(function () {
  function cellNumeric(text) {
    var m = text.replace(/,/g, '').match(/-?\d+(?:\.\d+)?/);
    return m ? parseFloat(m[0]) : null;
  }
  document.querySelectorAll('table').forEach(function (table) {
    var thead = table.tHead;
    var tbody = table.tBodies[0];
    if (!thead || !tbody) return;
    Array.from(thead.rows[0].cells).forEach(function (th, idx) {
      th.classList.add('sortable');
      th.addEventListener('click', function () {
        var rows = Array.from(tbody.rows);
        var asc = th.dataset.sortDir !== 'asc';
        var sample = rows.map(function (r) { return cellNumeric((r.cells[idx] || {}).textContent || ''); });
        var numeric = sample.filter(function (v) { return v !== null; }).length >= rows.length / 2;
        rows.sort(function (a, b) {
          var av = (a.cells[idx] || {}).textContent || '';
          var bv = (b.cells[idx] || {}).textContent || '';
          if (numeric) {
            var an = cellNumeric(av);
            var bn = cellNumeric(bv);
            if (an === null) an = asc ? Infinity : -Infinity;
            if (bn === null) bn = asc ? Infinity : -Infinity;
            return asc ? an - bn : bn - an;
          }
          return asc ? av.localeCompare(bv) : bv.localeCompare(av);
        });
        Array.from(thead.rows[0].cells).forEach(function (h) { h.removeAttribute('data-sort-dir'); });
        th.dataset.sortDir = asc ? 'asc' : 'desc';
        rows.forEach(function (r) { tbody.appendChild(r); });
      });
    });
  });
})();
</script>
{% block body_extra %}{% endblock %}
</body>
</html>
