<!DOCTYPE html>
<html lang="en">
<head>

<title>{{ page_title }} — Energy Intel</title>
<link rel="stylesheet" href="{{ asset('style.css') }}">
{% block head_extra %}{% endblock %}
</head>
<body>
<header class="topbar">
  <a class="brand" href="{{ link('') }}">energy-intel</a>
  <nav>
    <a href="{{ link('') }}">Latest</a>
    <a href="{{ link('archive/') }}">Archive</a>
    <a href="{{ link('peers/') }}">Peers</a>
    <a href="{{ link('macro/') }}">Macro</a>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
<footer>
  <small>
    Generated {{ generated_at }} UTC ·
    Data: EIA, FRED, Baker Hughes, SEC EDGAR, Yahoo Finance ·
    Position data never exposed on this site.
  </small>
</footer>
<script>
// Colorize +/- numerics in any rendered <td>.
(function () {
  var re = /^([+\-−])\s*\$?[\d,]+(?:\.\d+)?\s*%?$/;
  document.querySelectorAll('td').forEach(function (td) {
    var t = td.textContent.trim();
    var m = t.match(re);
    if (!m) return;
    if (m[1] === '+') td.classList.add('pos');
    else td.classList.add('neg');
  });
})();
</script>
{% block body_extra %}{% endblock %}
</body>
</html>
