{% extends "base.html" %}
{% block content %}
<h1>Archive</h1>
<p><input type="search" id="filter" placeholder="Filter by date or keyword… (e.g. 2026-04 or Permian)" autocomplete="off"></p>
<ul id="brief-list">
{% for item in briefs %}
  <li data-search="{{ item.search_blob|lower }}">
    <a href="{{ link('archive/' + item.slug + '.html') }}">{{ item.date_str }}</a>
    {% if item.preview %}<span class="preview"> — {{ item.preview }}</span>{% endif %}
  </li>
{% endfor %}
</ul>
{% endblock %}
{% block body_extra %}
<script>
(function () {
  var input = document.getElementById('filter');
  var items = document.querySelectorAll('#brief-list li');
  input.addEventListener('input', function () {
    var q = input.value.toLowerCase().trim();
    items.forEach(function (el) {
      el.style.display = !q || el.dataset.search.indexOf(q) !== -1 ? '' : 'none';
    });
  });
})();
</script>
{% endblock %}
